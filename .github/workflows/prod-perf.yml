name: Production Performance

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  performance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run production performance check
        env:
          PORTFOLIO_URL: https://thapelo-portfolio.vercel.app
        run: npm run perf:prod

      - name: Upload performance reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-performance-reports
          path: reports/performance/