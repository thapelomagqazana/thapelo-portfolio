name: Vercel Readiness

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify-vercel-readiness:
    name: Verify Vercel readiness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify production build
        run: npm run verify:build

      - name: Verify Vercel config exists
        run: test -f vercel.json